name: Atualizar Notificações

on:
  push:
    paths:
      - "estoque.html"
      - "sla_transporte.html"
      - "comercial.html"
      - "financeiro.html"
      - "assistencia.html"
      - "cancelamentos.html"
      - "devolucao.html"
      - "reputacao.html"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install beautifulsoup4

      - name: Rodar script de atualização
        run: python update_notifications.py

      - name: Commit e push do index.html atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "🔔 Notificações atualizadas automaticamente [$(date +'%d/%m/%Y %H:%M')]"
          git push
